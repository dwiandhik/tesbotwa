<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Reply - DW Cellkom</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #25D366; --danger: #ef4444; --bg: #f3f4f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; width: 100%; max-width: 480px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .nav a { text-decoration: none; font-weight: 700; color: #888; font-size: 14px; }
        .nav a.active { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 13px; }
        #status-badge { padding: 12px; border-radius: 12px; background: #f9fafb; border: 1px solid #eee; margin: 15px 0; font-weight: 600; }
        #qr-area img { width: 200px; border-radius: 10px; border: 1px solid #ddd; padding: 5px; }
        .btn { width: 100%; padding: 12px; color: white; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; margin-top: 10px; font-size: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .keyword-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>
    <div class="card">
        <h2>DW Cellkom</h2>
        <div class="nav">
            <a href="/">Auto Reply</a>
            <a href="/owner-keywords" class="active">Owner Reply</a>
            <a href="/reminder">Reminder</a>
            <a href="/update">Update Data</a>
            <a href="/broadcast">Broadcast</a>
            <a href="/logs">Log Aktivitas</a>
        </div>
        
        <div id="status-badge">Status: <span id="st-text">Memuat...</span></div>
        <div id="qr-area"></div>
        <button id="ctrl-btn" class="btn">...</button>

        <div style="text-align: left; margin-top: 25px;" id="form-container">
            <h3 id="form-title">Tambah Balasan Owner</h3>
            <p style="font-size: 12px; color: #666; margin-top: -10px; margin-bottom: 15px;">Balasan di halaman ini hanya akan aktif jika dikirim oleh nomor Owner.</p>
            <form id="keyword-form" action="/api/owner-keywords" method="POST" enctype="multipart/form-data">
                <input type="text" name="key" placeholder="Keyword (koma untuk banyak)" required>
                <textarea name="response" placeholder="Balasan bot..." rows="3" required></textarea>
                <input type="file" name="image" accept="image/*">
                <button type="submit" class="btn" style="background: var(--primary);">SIMPAN KEYWORD</button>
                <button type="button" id="cancel-edit-btn" class="btn" style="background: #6b7280; display: none; margin-top: 5px;">BATAL EDIT</button>
            </form>

            <h3 style="margin-top: 30px;">Daftar Balasan Owner</h3>
            <div id="keyword-list"></div>
        </div>
    </div>

    <script>
        const socket = io();
        const stText = document.getElementById('st-text');
        const qrArea = document.getElementById('qr-area');
        const ctrlBtn = document.getElementById('ctrl-btn');
        const keywordForm = document.getElementById('keyword-form');
        const formTitle = document.getElementById('form-title');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');

        function loadStatus() {
            fetch('/api/status').then(res => res.json()).then(data => updateUI(data.status, data.connected));
        }
        function loadKeys() {
            fetch('/api/owner-keywords').then(res => res.json()).then(data => {
                document.getElementById('keyword-list').innerHTML = data.map((item, i) => `
                    <div class="keyword-item">
                        <div style="text-align:left;">
                            <div style="font-weight:700; font-size:13px;">${item.key} ${item.image ? '🖼️' : ''}</div>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <a href="#" onclick="event.preventDefault(); editKey(${i})" style="color:#3b82f6; text-decoration:none; font-weight:700; font-size:12px; margin-right: 10px;">Edit</a>
                            <a href="/api/owner-keywords/delete/${i}" style="color:var(--danger); text-decoration:none; font-weight:700; font-size:12px;">Hapus</a>
                        </div>
                    </div>
                `).join('');
            });
        }

        async function editKey(index) {
            const res = await fetch(`/api/owner-keyword/${index}`);
            if (!res.ok) return alert('Gagal memuat keyword.');
            const data = await res.json();
            
            keywordForm.querySelector('input[name="key"]').value = data.key;
            keywordForm.querySelector('textarea[name="response"]').value = data.response;
            keywordForm.action = `/api/owner-keywords/edit/${index}`;
            formTitle.innerText = 'Edit Balasan Owner';
            keywordForm.querySelector('button[type="submit"]').innerText = 'UPDATE KEYWORD';
            cancelEditBtn.style.display = 'block';
            document.getElementById('form-container').scrollIntoView({ behavior: 'smooth' });
        }

        function resetForm() {
            keywordForm.reset();
            keywordForm.action = '/api/owner-keywords';
            formTitle.innerText = 'Tambah Balasan Owner';
            keywordForm.querySelector('button[type="submit"]').innerText = 'SIMPAN KEYWORD';
            cancelEditBtn.style.display = 'none';
        }

        cancelEditBtn.onclick = resetForm;

        socket.on('qr_update', (data) => { stText.innerText = data.status; qrArea.innerHTML = `<img src="${data.qr}">`; });
        socket.on('status_update', (data) => updateUI(data.status, data.connected));

        function updateUI(status, isConnected) {
            stText.innerText = status; stText.style.color = isConnected ? '#10b981' : '#ef4444';
            if (isConnected) {
                qrArea.innerHTML = '<div style="font-size: 50px;">✅</div>';
                ctrlBtn.innerText = 'PUTUSKAN WHATSAPP';
                ctrlBtn.style.background = 'var(--danger)';
                ctrlBtn.onclick = () => window.location.href = '/stop';
            } else {
                qrArea.innerHTML = '<div style="font-size: 50px; opacity:0.1;">💤</div>';
                ctrlBtn.innerText = 'HUBUNGKAN WHATSAPP';
                ctrlBtn.style.background = 'var(--primary)';
                ctrlBtn.onclick = () => window.location.href = '/start';
            }
        }
        loadStatus(); loadKeys();
    </script>
</body>
</html>

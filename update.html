<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Data - DW Cellkom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #25D366; --danger: #ef4444; --bg: #f3f4f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; width: 100%; max-width: 480px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .nav a { text-decoration: none; font-weight: 700; color: #888; font-size: 14px; }
        .nav a.active { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 13px; }
        
        .form-container { text-align: left; margin-top: 25px; }
        h3 { color: #333; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #555; }
        textarea, input[type="date"], select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        button { background-color: var(--primary); color: white; padding: 12px 15px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; width: 100%; font-weight: 700; }
        button:hover { opacity: 0.9; }
        .message { margin-top: 20px; padding: 10px; border-radius: 8px; text-align: center; font-size: 14px; }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="card">
        <h2>DW Cellkom</h2>
        <div class="nav">
            <a href="/">Auto Reply</a>
            <a href="/reminder">Reminder</a>
            <a href="/update" class="active">Update Data</a>
            <a href="/broadcast">Broadcast</a>
            <a href="/logs">Log Aktivitas</a>
        </div>

        <div class="form-container">
            <h3>Update Data Pelanggan</h3>
            <form id="updateForm">
                <label for="updateData">Data Update (satu per baris, format: nomor<SPASI>DD/MM/YYYY):</label>
                <textarea id="updateData" name="updateData" placeholder="Contoh:&#10;087xxxxxxxxx 9/3/2026&#10;081xxxxxxxxx 15-01-2027&#10;085xxxxxxxxx 20.12.2028" rows="5" required></textarea>

                <label for="sheetType">Pilih Sheet:</label>
                <select id="sheetType" name="sheetType" required>
                    <option value="MASTER_LIST">Master List Update</option>
                    <option value="AKRAB">Akrab List Update</option>
                    <option value="TSEL_UPDATE">Telkomsel (Tsel Update)</option>
                </select>

                <button type="submit">Update Data</button>
            </form>
            <div id="message" class="message" style="display: none;"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const updateForm = document.getElementById('updateForm');
            const submitButton = updateForm.querySelector('button[type="submit"]');
            const updateDataInput = document.getElementById('updateData');
            const sheetTypeSelect = document.getElementById('sheetType');
            const messageDiv = document.getElementById('message');

            const socket = io();
            let socketId = null;

            socket.on('connect', () => { socketId = socket.id; });
            socket.on('disconnect', () => { socketId = null; });

            socket.on('update_progress', (data) => {
                messageDiv.style.display = 'block';
                messageDiv.className = 'message'; // neutral class
                messageDiv.innerHTML = data.message;
            });

            socket.on('update_complete', (data) => {
                submitButton.disabled = false;
                submitButton.textContent = 'Update Data';

                messageDiv.style.display = 'block';
                messageDiv.textContent = data.message;
                if (data.success && data.allSucceeded) {
                    messageDiv.className = 'message success';
                    updateForm.reset();
                } else {
                    messageDiv.className = 'message error';
                }
            });

            updateForm.addEventListener('submit', async function(event) {
                event.preventDefault();

                if (!socketId) {
                    messageDiv.style.display = 'block';
                    messageDiv.textContent = 'Koneksi ke server belum siap. Mohon tunggu sejenak dan coba lagi.';
                    messageDiv.className = 'message error';
                    return;
                }

                const lines = updateDataInput.value.split('\n').map(line => line.trim()).filter(line => line);
                const updates = [];
                let parseError = false;
                for (const line of lines) {
                    // Regex to support DD/MM/YYYY, DD-MM-YYYY, DD.MM.YYYY, and single digits for day/month
                    const match = line.match(/^(\d+)\s+(\d{1,2})([\/\-.])(\d{1,2})\3(\d{4})$/);
                    if (!match) {
                        parseError = true;
                        break;
                    }
                    
                    const day = parseInt(match[2], 10);
                    const month = parseInt(match[4], 10);
                    const year = parseInt(match[5], 10);

                    // Validate date components to ensure it's a real date
                    const dateObj = new Date(year, month - 1, day);
                    if (dateObj.getFullYear() !== year || dateObj.getMonth() !== month - 1 || dateObj.getDate() !== day) {
                        parseError = true; // Invalid date like 31/02/2026
                        break;
                    }

                    // Normalize to DD/MM/YYYY for backend consistency
                    const newExpDate = `${String(day).padStart(2, '0')}/${String(month).padStart(2, '0')}/${year}`;
                    updates.push({ phoneNumber: match[1], newExpDate: newExpDate });
                }

                if (parseError || updates.length === 0) {
                    messageDiv.style.display = 'block';
                    messageDiv.textContent = 'Format data tidak valid atau kosong. Gunakan format: nomor<SPASI>DD/MM/YYYY (pemisah bisa /, -, atau .).';
                    messageDiv.className = 'message error';
                    return;
                }

                messageDiv.style.display = 'block';
                messageDiv.textContent = 'Memulai proses update...';
                messageDiv.className = 'message';
                submitButton.disabled = true;
                submitButton.textContent = 'Memproses...';

                try {
                    const response = await fetch('/api/update-data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ updates, sheetType: sheetTypeSelect.value, socketId })
                    });
                    if (!response.ok) {
                        const result = await response.json();
                        throw new Error(result.message || 'Gagal memulai proses update.');
                    }
                } catch (error) {
                    messageDiv.textContent = error.message || 'Gagal terhubung ke server. Silakan coba lagi.';
                    messageDiv.className = 'message error';
                    submitButton.disabled = false;
                    submitButton.textContent = 'Update Data';
                }
            });
        });
    </script>
</body>
</html>
